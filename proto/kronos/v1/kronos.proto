syntax = "proto3";

package kronos.v1;

option go_package = "github.com/rahulmodugula/kronos/gen/kronos/v1;kronosv1";

import "google/protobuf/timestamp.proto";

// JobStatus represents the lifecycle state of a job.
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING     = 1;
  JOB_STATUS_RUNNING     = 2;
  JOB_STATUS_COMPLETED   = 3;
  JOB_STATUS_FAILED      = 4;
  JOB_STATUS_CANCELLED   = 5;
  JOB_STATUS_DEAD        = 6; // exceeded max retries
}

message Job {
  string id          = 1;
  string name        = 2;
  string type        = 3;
  bytes  payload     = 4; // arbitrary JSON
  JobStatus status   = 5;
  int32 max_retries  = 6;
  int32 retry_count  = 7;
  google.protobuf.Timestamp scheduled_at = 8;
  google.protobuf.Timestamp created_at   = 9;
  google.protobuf.Timestamp updated_at   = 10;
  string error       = 11; // last error message if failed
  int32 priority     = 12; // 1 (lowest) to 10 (highest), default 5
}

message SubmitJobRequest {
  string name       = 1;
  string type       = 2;
  bytes  payload    = 3;
  int32  max_retries = 4; // default 3 if 0
  google.protobuf.Timestamp scheduled_at = 5; // nil = run immediately
  int32 priority    = 6; // 1–10, default 5 if unset
  string idempotency_key = 7; // optional; returns existing job if key matches active job
}

message SubmitJobResponse {
  string job_id = 1;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  Job job = 1;
}

message ListJobsRequest {
  JobStatus status  = 1; // filter by status; unspecified = all
  int32 page_size   = 2; // default 50
  string page_token = 3;
}

message ListJobsResponse {
  repeated Job jobs    = 1;
  string next_page_token = 2;
}

message CancelJobRequest {
  string job_id = 1;
}

message CancelJobResponse {}

service KronosService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
}
