syntax = "proto3";

package kronos.v1;

option go_package = "github.com/rahulmodugula/kronos/gen/kronos/v1;kronosv1";

import "google/protobuf/timestamp.proto";

// WorkflowRunStatus represents the lifecycle state of a workflow run.
enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  WORKFLOW_RUN_STATUS_PENDING   = 1;
  WORKFLOW_RUN_STATUS_RUNNING   = 2;
  WORKFLOW_RUN_STATUS_COMPLETED = 3;
  WORKFLOW_RUN_STATUS_FAILED    = 4;
  WORKFLOW_RUN_STATUS_CANCELLED = 5;
  WORKFLOW_RUN_STATUS_FORKED    = 6;
}

// WorkflowRun represents a single execution of a workflow.
message WorkflowRun {
  string id               = 1;
  string workflow_id      = 2; // FK to workflows.id, pins the workflow version
  string workflow_name    = 3; // convenience; mirrors the workflow name
  WorkflowRunStatus status = 4;
  bytes input             = 5; // JSON input to the workflow
  bytes output            = 6; // JSON output (only set when completed)
  string error            = 7; // error message if failed
  string parent_run_id    = 8; // for forked runs
  google.protobuf.Timestamp started_at   = 9;
  google.protobuf.Timestamp finished_at  = 10;
  google.protobuf.Timestamp created_at   = 11;
  google.protobuf.Timestamp updated_at   = 12;
}

// StartWorkflowRequest
message StartWorkflowRequest {
  string workflow_name = 1; // required; name of the workflow to start
  bytes input          = 2; // optional; JSON input to the workflow
}

// StartWorkflowResponse
message StartWorkflowResponse {
  string run_id = 1; // unique ID of the started run
}

// GetRunRequest
message GetRunRequest {
  string run_id = 1; // required
}

// GetRunResponse
message GetRunResponse {
  WorkflowRun run = 1;
}

// ListRunsRequest
message ListRunsRequest {
  string workflow_name = 1;  // optional; filter by workflow name
  WorkflowRunStatus status = 2; // optional; filter by status (unspecified = all)
  int32 page_size     = 3;  // default 50, max 200
  string page_token   = 4;  // for pagination
}

// ListRunsResponse
message ListRunsResponse {
  repeated WorkflowRun runs   = 1;
  string next_page_token     = 2;
}

// CancelRunRequest
message CancelRunRequest {
  string run_id = 1; // required
}

// CancelRunResponse
message CancelRunResponse {}

// WorkflowEvent represents an event in a workflow run's timeline.
message WorkflowEvent {
  string id         = 1;
  string run_id     = 2;
  int32 seq         = 3;  // sequence number
  google.protobuf.Timestamp ts = 4;
  string event_type = 5;  // run_started, step_started, step_completed, etc.
  bytes payload     = 6;  // JSON payload of the event
}

// GetRunEventsRequest
message GetRunEventsRequest {
  string run_id = 1; // required
}

// GetRunEventsResponse
message GetRunEventsResponse {
  repeated WorkflowEvent events = 1;
}

// StreamRunHistoryRequest for streaming run events (used by replay)
message StreamRunHistoryRequest {
  string run_id = 1; // required
}

// service WorkflowService
service WorkflowService {
  rpc StartWorkflow(StartWorkflowRequest) returns (StartWorkflowResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse);
  rpc GetRunEvents(GetRunEventsRequest) returns (GetRunEventsResponse);
  rpc StreamRunHistory(StreamRunHistoryRequest) returns (stream WorkflowEvent);
}
