linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - contextcheck
    - noctx
    - exhaustive
    - godot
linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/rahulmodugula/kronos
run:
  timeout: 5m
  go: "1.25"
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
